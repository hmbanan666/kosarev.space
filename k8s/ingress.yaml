apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web-app
  namespace: kosarev-space
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - kosarev.space
      secretName: web-app-tls
  rules:
    - host: kosarev.space
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-app
                port:
                  number: 80
